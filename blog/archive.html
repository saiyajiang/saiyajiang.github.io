  <style>
    :root{--bg:#0d0d0d;--bg-card:#161616;--border:#2a2a2a;--border-hover:#404040;--text-primary:#f0f0f0;--text-secondary:#999;--text-muted:#555;--accent:#6ee7b7;--accent-2:#818cf8}
    *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text-primary);font-family:'Inter','Noto Sans SC',sans-serif;font-size:16px;line-height:1.8}
    header{position:sticky;top:0;z-index:100;background:rgba(13,13,13,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:18px;font-weight:700;color:var(--text-primary);text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo span{background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    nav{display:flex;gap:8px}
    nav a{color:var(--text-secondary);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:6px;transition:all .2s}
    nav a:hover{color:var(--text-primary);background:var(--bg-card)}
    nav a.active{color:var(--accent)}
    .page-hero{max-width:760px;margin:0 auto;padding:64px 24px 40px}
    .page-hero h1{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
    .page-hero p{color:var(--text-secondary);font-size:15px}
    .archive-body{max-width:760px;margin:0 auto;padding:0 24px 80px}
    .year-group{margin-bottom:48px}
    .year-label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .archive-list{display:flex;flex-direction:column;gap:0}
    .archive-item{display:flex;align-items:flex-start;gap:20px;padding:16px 0;border-bottom:1px solid var(--border);text-decoration:none;transition:all .2s}
    .archive-item:last-child{border-bottom:none}
    .archive-item:hover .archive-title{color:var(--accent)}
    .archive-date{font-size:13px;color:var(--text-muted);width:80px;flex-shrink:0;padding-top:2px}
    .archive-info{flex:1}
    .archive-title{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:4px;transition:color .2s}
    .archive-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .archive-cat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
    .archive-time{font-size:12px;color:var(--text-muted)}
    .cat-tech{background:rgba(96,165,250,.1);color:#60a5fa}
    .cat-finance{background:rgba(110,231,183,.1);color:#6ee7b7}
    .cat-game{background:rgba(244,114,182,.1);color:#f472b6}
    .cat-life{background:rgba(251,191,36,.1);color:#fbbf24}
    .cat-share{background:rgba(167,139,250,.1);color:#a78bfa}
    footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;color:var(--text-muted);font-size:13px}
    footer a{color:var(--accent);text-decoration:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>
